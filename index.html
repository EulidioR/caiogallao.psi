  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

aber se é hora de buscar ajuda?<\u002Fh2>\n      <p style=\"margin: 0; font: 400 15px/1.65 Mulish, sans-serif; color: #4a5468\">A dependência de apostas raramente aparece de uma vez. Ela se instala aos poucos — e reconhecer os padrões é o primeiro passo do tratamento.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 16px\">\n      <div style=\"background: #fff; border: 1px solid rgba(27,42,74,.08); border-radius: 16px; padding: 26px; display: flex; flex-direction: column; gap: 10px\">\n        <div style=\"font: 400 22px/1 Marcellus, serif; color: #C89B5A\">01<\u002Fdiv>\n        <div style=\"font: 700 15px/1.3 Mulish, sans-serif; color: #1B2A4A\">Apostar mais do que planejava<\u002Fdiv>\n        <div style=\"font: 400 13.5px/1.6 Mulish, sans-serif; color: #4a5468\">Valores e tempo de jogo crescem sem que você perceba — e os limites que define não se sustentam.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background: #fff; border: 1px solid rgba(27,42,74,.08); border-radius: 16px; padding: 26px; display: flex; flex-direction: column; gap: 10px\">\n        <div style=\"font: 400 22px/1 Marcellus, serif; color: #C89B5A\">02<\u002Fdiv>\n        <div style=\"font: 700 15px/1.3 Mulish, sans-serif; color: #1B2A4A\">Apostar para recuperar perdas<\u002Fdiv>\n        <div style=\"font: 400 13.5px/1.6 Mulish, sans-serif; color: #4a5468\">A tentativa de \"zerar o prejuízo\" mantém o ciclo ativo e costuma aprofundar as perdas.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background: #fff; border: 1px solid rgba(27,42,74,.08); border-radius: 16px; padding: 26px; display: flex; flex-direction: column; gap: 10px\">\n        <div style=\"font: 400 22px/1 Marcellus, serif; color: #C89B5A\">03<\u002Fdiv>\n        <div style=\"font: 700 15px/1.3 Mulish, sans-serif; color: #1B2A4A\">Esconder o hábito<\u002Fdiv>\n        <div style=\"font: 400 13.5px/1.6 Mulish, sans-serif; color: #4a5468\">Omitir apostas de familiares, parceiros ou amigos — ou minimizar o quanto elas ocupam sua rotina.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background: #fff; border: 1px solid rgba(27,42,74,.08); border-radius: 16px; padding: 26px; display: flex; flex-direction: column; gap: 10px\">\n        <div style=\"font: 400 22px/1 Marcellus, serif; color: #C89B5A\">04<\u002Fdiv>\n        <div style=\"font: 700 15px/1.3 Mulish, sans-serif; color: #1B2A4A\">Ansiedade ao tentar parar<\u002Fdiv>\n        <div style=\"font: 400 13.5px/1.6 Mulish, sans-serif; color: #4a5468\">Irritabilidade, inquietação ou pensamentos constantes sobre o jogo quando tenta reduzir.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"grid-column: 1 / -1; background: #F1EBE0; border-radius: 16px; padding: 22px 26px; display: flex; align-items: center; gap: 16px\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 48 48\" style=\"flex: none\"><path d=\"M13 30 a11 11 0 0 1 22 0\" fill=\"none\" stroke=\"#C89B5A\" stroke-width=\"3.5\" stroke-linecap=\"round\"><\u002Fpath><line x1=\"7\" y1=\"30\" x2=\"41\" y2=\"30\" stroke=\"#1B2A4A\" stroke-width=\"3.5\" stroke-linecap=\"round\"><\u002Fline><\u002Fsvg>\n        <div style=\"font: 400 14px/1.6 Mulish, sans-serif; color: #1B2A4A\">Identificou um ou mais sinais? Isso não define quem você é. <strong>Dependência de jogo tem tratamento<\u002Fstrong> — e ele começa com uma conversa.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PROCESSO -->\n<section id=\"processo\" data-screen-label=\"Como funciona\" style=\"background: #fff; border-top: 1px solid rgba(27,42,74,.06); border-bottom: 1px solid rgba(27,42,74,.06); scroll-margin-top: 80px\">\n  <div style=\"max-width: 1120px; margin: 0 auto; padding: 96px 32px; display: flex; flex-direction: column; gap: 56px\">\n    <div style=\"display: flex; flex-direction: column; gap: 18px; max-width: 560px\">\n      <div style=\"display: flex; align-items: center; gap: 10px\">\n        <span style=\"width: 34px; height: 3px; background: #C89B5A\"><\u002Fspan>\n        <span style=\"font: 700 11px/1 Mulish, sans-serif; color: #A87F42; letter-spacing: .24em; text-transform: uppercase\">Como funciona<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"margin: 0; font: 400 36px/1.25 Marcellus, serif; color: #1B2A4A\">Um processo clínico, no seu ritmo<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 40px\">\n      <div style=\"display: flex; flex-direction: column; gap: 14px; border-top: 3px solid #C89B5A; padding-top: 22px\">\n        <div style=\"font: 700 11px/1 Mulish, sans-serif; color: #A87F42; letter-spacing: .2em; text-transform: uppercase\">Passo 1<\u002Fdiv>\n        <div style=\"font: 400 21px/1.3 Marcellus, serif; color: #1B2A4A\">Primeira conversa<\u002Fdiv>\n        <div style=\"font: 400 14px/1.65 Mulish, sans-serif; color: #4a5468\">Um encontro inicial, sem compromisso, para entender sua história, o papel das apostas nela e o que você espera do processo.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display: flex; flex-direction: column; gap: 14px; border-top: 3px solid rgba(200,155,90,.45); padding-top: 22px\">\n        <div style=\"font: 700 11px/1 Mulish, sans-serif; color: #A87F42; letter-spacing: .2em; text-transform: uppercase\">Passo 2<\u002Fdiv>\n        <div style=\"font: 400 21px/1.3 Marcellus, serif; color: #1B2A4A\">Plano terapêutico<\u002Fdiv>\n        <div style=\"font: 400 14px/1.65 Mulish, sans-serif; color: #4a5468\">Definimos juntos objetivos e estratégias — gatilhos, controle de impulsos, reorganização financeira e da rotina.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display: flex; flex-direction: column; gap: 14px; border-top: 3px solid rgba(200,155,90,.2); padding-top: 22px\">\n        <div style=\"font: 700 11px/1 Mulish, sans-serif; color: #A87F42; letter-spacing: .2em; text-transform: uppercase\">Passo 3<\u002Fdiv>\n        <div style=\"font: 400 21px/1.3 Marcellus, serif; color: #1B2A4A\">Acompanhamento contínuo<\u002Fdiv>\n        <div style=\"font: 400 14px/1.65 Mulish, sans-serif; color: #4a5468\">Sessões regulares, online ou presenciais, com foco em prevenção de recaídas e na construção de uma vida além do jogo.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SOBRE -->\n<section id=\"sobre\" data-screen-label=\"Sobre\" style=\"scroll-margin-top: 80px\">\n  <div style=\"max-width: 1120px; margin: 0 auto; padding: 96px 32px; display: grid; grid-template-columns: .9fr 1.1fr; gap: 72px; align-items: center\">\n    <div style=\"position: relative; justify-self: start\">\n      <div style=\"position: absolute; inset: -18px 18px 18px -18px; background: #EDE5D6; border-radius: 24px; pointer-events: none\"><\u002Fdiv>\n      <x-import component-from-global-scope=\"image-slot\" from=\"8049efc6-68d3-4a7c-b873-f76a7f92ccf0#/image-slot.js\" id=\"foto-sobre\" shape=\"rounded\" radius=\"24\" placeholder=\"Foto no consultório ou retrato informal\" style=\"width: 400px; height: 460px; display: block; position: relative\" hint-size=\"400px,460px\"><\u002Fx-import>\n    <\u002Fdiv>\n    <div style=\"display: flex; flex-direction: column; gap: 20px\">\n      <div style=\"display: flex; align-items: center; gap: 10px\">\n        <span style=\"width: 34px; height: 3px; background: #C89B5A\"><\u002Fspan>\n        <span style=\"font: 700 11px/1 Mulish, sans-serif; color: #A87F42; letter-spacing: .24em; text-transform: uppercase\">Sobre<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"margin: 0; font: 400 36px/1.25 Marcellus, serif; color: #1B2A4A\">Caio Gallão Brito<\u002Fh2>\n      <p style=\"margin: 0; font: 400 15.5px/1.7 Mulish, sans-serif; color: #4a5468\">Psicólogo clínico (CRP 06/00000) especializado no tratamento da dependência de jogos e apostas online. <em>[Envie sua mini-bio: formação, abordagem terapêutica, tempo de experiência e cidade de atendimento — substituo este texto.]<\u002Fem><\u002Fp>\n      <div st und: #C89B5A; padding: 18px 34px; border-radius: 999px; text-decoration: none; margin-top: 6px\" style-hover=\"background: #d6ab6c\">Agendar pelo WhatsApp<\u002Fa>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER -->\n<footer style=\"background: #16223C\">\n  <div style=\"max-width: 1120px; margin: 0 auto; padding: 36px 32px; display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap\">\n    <div style=\"display: flex; align-items: center; gap: 12px\">\n      <svg width=\"26\" height=\"26\" viewBox=\"0 0 48 48\"><path d=\"M13 30 a11 11 0 0 1 22 0\" fill=\"none\" stroke=\"#C89B5A\" stroke-width=\"3.5\" stroke-linecap=\"round\"><\u002Fpath><line x1=\"7\" y1=\"30\" x2=\"41\" y2=\"30\" stroke=\"#F7F4EE\" stroke-width=\"3.5\" stroke-linecap=\"round\"><\u002Fline><\u002Fsvg>\n      <span style=\"font: 400 14px/1 Marcellus, serif; color: #F7F4EE\">Caio Gallão Brito · CRP 06/00000<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"font: 400 12px/1.6 Mulish, sans-serif; color: rgba(220,225,234,.55); text-align: right\">@caiogallao.psi · Atendimento online e presencial<br>Em crise? CVV — ligue 188 (24h, gratuito)<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;whatsapp&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;5511999999999&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Contato&quot;}, &quot;modoDiscreto&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Comunicação&quot;}}\">\nclass Component extends DCLogic {\n  renderVals() {\n    const discreto = this.props.modoDiscreto ?? false;\n    const num = (this.props.whatsapp ?? '5511999999999').replace(/\\D/g, '');\n    return {\n      modoDiscreto: discreto,\n      mencionarApostas: !discreto,\n      waLink: 'https://wa.me/' + num + '?text=' + encodeURIComponent('Olá, gostaria de agendar uma primeira conversa.'),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
